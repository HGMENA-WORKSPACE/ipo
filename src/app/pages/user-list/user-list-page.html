<div class="min-h-screen bg-gray-50 pb-20 md:pb-0">
  <heading [title]="'nav.lists' | translate" />
  <!--  -->
  @if (loading()) {
    <div class="flex items-center justify-center py-12">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
    </div>
  } @else {
    <div class="max-w-7xl mx-auto px-4 py-4 md:px-6 lg:px-8">
      <div class="flex gap-2 mb-6">
        @for (tab of tabs(); track tab.id) {
          <button
            (click)="setActiveTab(tab.id)"
            class="flex-1 px-4 py-3 rounded-lg text-center transition-colors min-h-[48px]"
            [class]="tab.active ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-700'"
          >
            {{ tab.label }}
          </button>
        }
      </div>
      <!-- Tab Content -->
      <div class="tab-content">
        <table class="w-full text-left table-auto min-w-max">
          <thead>
            <tr class="border-b border-slate-300 bg-slate-50">
              <th class="p-4 text-sm font-normal leading-none text-slate-500">
                {{ 'lists.table.title' | translate }}
              </th>
            </tr>
          </thead>
          <tbody>
            @for (item of listSelected(); track $index) {
              <tr class="hover:bg-slate-50" (click)="navigateToBook(item)">
                <td class="p-4 border-b border-slate-200 py-5">{{ item.title }}</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  }
</div>
