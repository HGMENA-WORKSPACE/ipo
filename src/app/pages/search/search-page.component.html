<div class="min-h-screen bg-gray-50 pb-20 md:pb-0">
  <heading [title]="'search.results' | translate: { count: totalCount() }" />
  <!--  -->
  <div class="max-w-7xl mx-auto px-4 py-4 md:px-6 lg:px-8">
    <!--  -->
    <list-books
      [page]="page()"
      [limit]="limit()"
      [query]="query()"
      (pageChange)="page.set($event)"
      (totalCountChange)="totalCount.set($event)"
    ></list-books>
  </div>
</div>
