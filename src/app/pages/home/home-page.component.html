<div class="min-h-screen bg-gray-50 pb-20 md:pb-0">
  <header class="bg-white border-b sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 py-4 md:px-6 lg:px-8">
      <div class="flex items-center justify-between mb-4">
        <h1 class="text-2xl font-bold text-indigo-600">LibriVox</h1>
        <div class="flex items-center gap-2">
          <button 
            (click)="toggleLanguage()"
            class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-indigo-600 transition-colors min-h-[44px] min-w-[44px] flex items-center justify-center"
          >
            {{ currentLang() === 'es' ? 'EN' : 'ES' }}
          </button>
          <button 
            class="p-2 text-gray-600 hover:text-indigo-600 transition-colors min-h-[44px] min-w-[44px] flex items-center justify-center"
            aria-label="Ayuda"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </button>
        </div>
      </div>
      
      <app-input
        [placeholder]="'search.placeholder' | translate"
        [voiceEnabled]="true"
        (search)="onSearch($event)"
      />
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 md:px-6 lg:px-8">
    @if (loading()) {
      <div class="flex items-center justify-center py-12">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
      </div>
    } @else {
      <section class="mb-8">
        <h2 class="text-lg md:text-xl font-semibold text-gray-900 mb-4">
          {{ 'home.recommended' | translate }}
        </h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-4">
          @for (book of recommended(); track book.key) {
            <app-card [book]="book" [link]="book.key" />
          }
        </div>
      </section>

      <section>
        <h2 class="text-lg md:text-xl font-semibold text-gray-900 mb-4">
          {{ 'home.popular' | translate }}
        </h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-4">
          @for (book of popular(); track book.key) {
            <app-card [book]="book" [link]="book.key" />
          }
        </div>
      </section>
    }
  </main>
</div>
