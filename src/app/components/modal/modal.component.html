@if (isOpen()) {
  <div 
    class="fixed inset-0 z-50 overflow-y-auto"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="title() ? 'modal-title' : null"
  >
    <div class="flex min-h-screen items-center justify-center p-4">
      <div 
        class="fixed inset-0 bg-black/50 transition-opacity"
        (click)="onBackdropClick() ? close.emit() : null"
      ></div>
      
      <div 
        class="relative bg-white rounded-xl shadow-xl transform transition-all"
        [class]="modalClass()"
      >
        @if (title()) {
          <div class="flex items-center justify-between p-4 border-b">
            <h3 id="modal-title" class="text-lg font-semibold text-gray-900">
              {{ title() }}
            </h3>
            <button 
              (click)="close.emit()"
              class="p-1 text-gray-400 hover:text-gray-600 rounded-full transition-colors"
              aria-label="Cerrar"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
        }
        
        <div class="p-4">
          <ng-content />
        </div>
        
        @if (showActions()) {
          <div class="flex gap-3 p-4 border-t bg-gray-50 rounded-b-xl">
            <ng-content select="[modal-cancel]" />
            <ng-content select="[modal-confirm]" />
          </div>
        }
      </div>
    </div>
  </div>
}
