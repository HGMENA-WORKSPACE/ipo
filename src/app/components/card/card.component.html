<article 
  class="bg-white rounded-xl shadow-sm hover:shadow-md transition-all duration-300 overflow-hidden group cursor-pointer"
  [routerLink]="link()"
>
  <div class="aspect-[3/4] relative bg-gray-100 overflow-hidden">
    @if (book().cover_i) {
      <img 
        [src]="coverUrl()" 
        [alt]="book().title"
        class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
        loading="lazy"
      />
    } @else {
      <div class="w-full h-full flex items-center justify-center bg-gradient-to-br from-indigo-50 to-purple-50">
        <svg class="w-16 h-16 text-indigo-200" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
      </div>
    }
    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
      <button 
        class="p-3 bg-white rounded-full transform scale-0 group-hover:scale-100 transition-transform duration-300"
        (click)="onPlay.emit($event); $event.stopPropagation()"
      >
        <svg class="w-6 h-6 text-indigo-600 ml-1" fill="currentColor" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="p-4">
    <h3 class="font-semibold text-gray-900 truncate text-sm md:text-base" [title]="book().title">
      {{ book().title }}
    </h3>
    <p class="text-gray-500 text-sm truncate mt-1" [title]="book().author_name[0]">
      {{ book().author_name[0] || 'Unknown' }}
    </p>
    @if (book().first_publish_year) {
      <p class="text-gray-400 text-xs mt-2">
        {{ book().first_publish_year }}
      </p>
    }
  </div>
</article>
