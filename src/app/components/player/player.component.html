<div class="bg-gray-900 text-white p-4 rounded-xl">
  <div class="flex items-center gap-4 mb-4">
    <div class="flex-1 min-w-0">
      <h4 class="font-semibold truncate">{{ title() }}</h4>
      <p class="text-gray-400 text-sm truncate">{{ author() }}</p>
    </div>
    @if (coverUrl()) {
      <img [src]="coverUrl()" class="w-12 h-12 rounded-lg object-cover" alt="" />
    }
  </div>

  <div class="flex items-center gap-2 mb-4">
    <span class="text-xs text-gray-400 w-10">{{ formatTime(currentTime()) }}</span>
    <input
      type="range"
      [min]="0"
      [max]="duration() || 100"
      [value]="currentTime()"
      (input)="onSeek($event)"
      class="flex-1 h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-indigo-500"
    />
    <span class="text-xs text-gray-400 w-10 text-right">{{ formatTime(duration()) }}</span>
  </div>

  <div class="flex items-center justify-between">
    <div class="flex items-center gap-2">
      <button
        (click)="skip(-10)"
        class="p-2 hover:bg-gray-800 rounded-full transition-colors"
        aria-label="Retroceder 10 segundos"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0019 16V8a1 1 0 00-1.6-.8l-5.334 4zM4.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0011 16V8a1 1 0 00-1.6-.8l-5.334 4z"
          />
        </svg>
      </button>

      <button
        (click)="togglePlay()"
        class="p-3 bg-indigo-600 hover:bg-indigo-700 rounded-full transition-colors"
        [attr.aria-label]="playing() ? 'Pausar' : 'Reproducir'"
      >
        @if (playing()) {
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
            <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z" />
          </svg>
        } @else {
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z" />
          </svg>
        }
      </button>

      <button
        (click)="skip(10)"
        class="p-2 hover:bg-gray-800 rounded-full transition-colors"
        aria-label="Avanzar 10 segundos"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M11.933 12.8a1 1 0 000-1.6L6.6 7.2A1 1 0 005 8v8a1 1 0 001.6.8l5.333-4zM19.933 12.8a1 1 0 000-1.6l-5.333-4A1 1 0 0013 8v8a1 1 0 001.6.8l5.333-4z"
          />
        </svg>
      </button>
    </div>

    <div class="flex items-center gap-2">
      <select
        [value]="playbackRate()"
        (change)="onRateChange($event)"
        class="bg-gray-800 text-white text-sm rounded px-2 py-1 border-none focus:ring-2 focus:ring-indigo-500"
        aria-label="Velocidad de reproducción"
      >
        @for (rate of rates; track rate) {
          <option [value]="rate">{{ rate }}x</option>
        }
      </select>

      <button
        (click)="toggleMute()"
        class="p-2 hover:bg-gray-800 rounded-full transition-colors"
        [attr.aria-label]="muted() ? 'Activar sonido' : 'Silenciar'"
      >
        @if (muted() || volume() === 0) {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"
            />
          </svg>
        } @else {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"
            />
          </svg>
        }
      </button>
    </div>
  </div>
</div>
