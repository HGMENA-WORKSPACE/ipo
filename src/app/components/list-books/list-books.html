@if (loading()) {
<div class="flex items-center justify-center py-12">
  <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
</div>
} @else if (books().length === 0 && query()) {
<div class="text-center py-12">
  <svg
    class="w-16 h-16 text-gray-300 mx-auto mb-4"
    fill="none"
    stroke="currentColor"
    viewBox="0 0 24 24"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="2"
      d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
    />
  </svg>
  <p class="text-gray-500">{{ 'search.noResults' | translate: { term: query } }}</p>
</div>
} @else {
<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-4">
  @for (book of books(); track book.key) {
  <card [book]="book" [link]="book.key" />
  }
</div>

@if (!!totalPages()) {
<div class="flex justify-center gap-2 mt-6 flex-wrap">
  @for (pageNumber of pageNumbers(); track pageNumber) {
  <button
    (click)="goToPage(pageNumber)"
    class="w-10 h-10 rounded-full text-sm transition-colors min-h-[44px] min-w-[44px] flex items-center justify-center"
    [class]="
            page() === pageNumber
              ? 'bg-indigo-600 text-white'
              : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
          "
  >
    {{ pageNumber }}
  </button>
  }
</div>
} }
