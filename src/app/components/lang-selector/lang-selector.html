<div class="flex items-center gap-2">
  <select
    (change)="onLanguageChange($event)"
    class="px-3 py-2 text-sm font-medium text-gray-600 bg-white border border-gray-300 rounded-md hover:text-indigo-600 hover:border-indigo-600 transition-colors min-h-[44px] min-w-[44px] cursor-pointer"
  >
    @for (item of availableLanguages(); track $index) {
      <option [value]="item.code" [selected]="item?.selected">
        {{ item.label }}
      </option>
    }
  </select>
</div>
